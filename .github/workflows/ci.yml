name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Typecheck · Lint · Test · Build · Secret-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint (includes SEC-009 no-danger rule)
        run: pnpm lint

      - name: Unit & component tests
        run: pnpm test

      - name: Build
        run: pnpm build
        env:
          VITE_SUPABASE_URL: https://example.supabase.co
          VITE_SUPABASE_ANON_KEY: ci-placeholder-anon-key

      - name: Secret scan (SEC-005)
        run: pnpm secret-scan

      - name: Upload web build
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: apps/web/dist
          retention-days: 3

  e2e:
    name: Playwright smoke (login → browse → detail)
    runs-on: ubuntu-latest
    needs: verify
    # Runs only when a test backend is configured (repo variable RUN_E2E=true).
    if: vars.RUN_E2E == 'true'
    env:
      PLAYWRIGHT_BASE_URL: ${{ vars.PLAYWRIGHT_BASE_URL }}
      VITE_SUPABASE_URL: ${{ secrets.E2E_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.E2E_SUPABASE_ANON_KEY }}
      SUPABASE_URL: ${{ secrets.E2E_SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.E2E_SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Install Playwright browsers
        run: pnpm --filter @kanto/web exec playwright install --with-deps chromium webkit
      - name: Run smoke + accessibility
        run: pnpm test:e2e

  lighthouse:
    name: Lighthouse budgets (a11y / perf)
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build
        run: pnpm build
        env:
          VITE_SUPABASE_URL: https://example.supabase.co
          VITE_SUPABASE_ANON_KEY: ci-placeholder-anon-key
      - name: Run Lighthouse CI
        run: pnpm dlx @lhci/cli@0.14.x autorun

  headers-smoke:
    name: Security headers smoke (SEC-011)
    runs-on: ubuntu-latest
    needs: verify
    # Verifies the deployed preview/prod serves the required headers.
    if: vars.HEADERS_SMOKE_URL != ''
    steps:
      - uses: actions/checkout@v4
      - name: Assert security headers present
        run: node scripts/check-headers.mjs "${{ vars.HEADERS_SMOKE_URL }}"
