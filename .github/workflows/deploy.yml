name: Deploy

# Production publish is owned by the Cloudflare Pages GitHub integration, which
# auto-deploys from main (and produces per-PR preview deploys) on its own. This
# workflow only runs a post-deploy security-header smoke against production once
# CI passes on main — it does not publish, so it needs no Cloudflare credentials.

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    name: Post-deploy header smoke (production)
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Post-deploy header smoke (SEC-011)
        run: node scripts/check-headers.mjs "${{ vars.PROD_URL }}"
